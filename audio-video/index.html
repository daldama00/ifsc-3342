<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Conner Woods">
    <title>Video.js Player | Trading Card Show</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/video.css">
</head>
<body>

    <header>
        <div class="card">
            <h1>Video.js Player</h1>
            <p>Streaming YouTube content via Video.js</p>
        </div>
    </header>

    <main>
        <section class="video_container">
            <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
            
            <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/Youtube.min.js"></script>

            <video
                id="vid1"
                class="video-js vjs-default-skin vjs-big-play-centered"
                controls
                autoplay
                width="640" height="264"
                data-setup='{ "techOrder": ["youtube"], "sources": [{ "type": "video/youtube", "src": "https://www.youtube.com/watch?v=U_uuHL_rSsk"}] }'>
            </video>
        </section>
    </main>

</body>
</html>
