 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Daniel Aldama">
    <title>Responsive Images</title>

    <link rel="stylesheet" href="assets/css/images.css">
</head>
<body>

    <header>
        <h1>Responsive Images that use srcset</h1>
    </header>
 
 
 <main class="layout">
    <section>
        <img class="responsive-image" src="assets/img/trading card show.png"
            srcset="assets/img/trading card show-500.png 500w, 
                    assets/img/trading card show-750.png 750w,
                    assets/img/trading card show-1000.png 1000w,
                    assets/img/trading card show-1500.png 1500w"
            sizes="(max-width: 600px) 100vw,
                   (max-width: 1200px) 50vw,
                   33vw"
            alt="trading card show image">

    </section>

    <footer>
  <div id="copyright">
    &copy; 2026 Daniel Aldama | <a href="#top">Top</a>
  </div>
</footer>

</body>
</html>
